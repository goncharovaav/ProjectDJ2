<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="body-register">
<div class="register-container">
    <div class="register-card">
        <h2 class="register-title">Регистрация</h2>

        <form method="post">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="error-box">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            {% for field in form %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="error-text">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn-save">Зарегистрироваться</button>
        </form>
        <div class="link-box">
            <a href="{% url 'login' %}">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</div>
</body>
</html>
